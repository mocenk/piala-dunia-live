<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Live streaming Piala Dunia FIFA gratis - 68 channel HD/FHD">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>⚽ Piala Dunia Live - FIFA World Cup Streaming</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --surface-2: #1f1f1f;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --text-2: #aaa;
      --text-3: #777;
      --accent: #4a8aff;
      --accent-2: #1a4aff;
      --fifa: #ffcc00;
      --fifa-2: #ff5722;
      --danger: #ff4444;
      --success: #00d68f;
      --hd: #00b894;
      --fhd: #6c5ce7;
      --safe-top: env(safe-area-inset-top, 0);
      --safe-bottom: env(safe-area-inset-bottom, 0);
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-size: 14px;
      line-height: 1.4;
      min-height: 100vh;
      overscroll-behavior: none;
    }
    body {
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      background: linear-gradient(180deg, #0a0a0a 0%, #0f0f12 100%);
    }

    /* === Header === */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .brand-icon {
      font-size: 24px;
      filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.5));
    }
    .brand-text { color: var(--text); }
    .brand-sub {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--danger);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .live-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* === Player === */
    .player-wrap {
      position: relative;
      background: #000;
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 50vh;
      overflow: hidden;
    }
    .player-wrap video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }
    .player-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      color: var(--text-2);
      gap: 12px;
      transition: opacity 0.3s;
    }
    .player-loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--fifa);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .now-playing {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }
    .now-playing-name {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 6px;
      max-width: 70%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .now-playing-quality {
      background: rgba(74, 138, 255, 0.9);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    /* === Search & Filter === */
    .toolbar {
      padding: 12px 16px 8px;
      background: var(--bg);
      position: sticky;
      top: 56px;
      z-index: 99;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-3); }
    .filters {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .chip-count {
      display: inline-block;
      background: rgba(255, 255, 255, 0.15);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 4px;
      font-weight: 700;
    }

    /* === Channel Grid === */
    main {
      padding: 12px 16px 24px;
    }
    /* === Live Events (Sedang Tayang) === */
    .live-events-section {
      margin: 16px 0 8px;
      display: none;
    }
    .live-events-section.show { display: block; }
    .live-events-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .live-events-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .live-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 8px rgba(255, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
    }
    .live-events-count {
      font-size: 10px;
      color: var(--text-3);
      font-weight: 600;
    }
    .live-events-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .live-events-scroll::-webkit-scrollbar { display: none; }
    .live-event-card {
      flex-shrink: 0;
      width: 240px;
      background: linear-gradient(135deg, rgba(255, 68, 68, 0.12) 0%, rgba(255, 87, 34, 0.08) 100%);
      border: 1px solid rgba(255, 68, 68, 0.3);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      color: inherit;
      text-align: left;
      -webkit-appearance: none;
    }
    .live-event-card:active { transform: scale(0.97); }
    .live-event-card:hover {
      border-color: rgba(255, 68, 68, 0.6);
      background: linear-gradient(135deg, rgba(255, 68, 68, 0.18) 0%, rgba(255, 87, 34, 0.12) 100%);
    }
    .live-event-category {
      font-size: 10px;
      font-weight: 700;
      color: var(--danger);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .live-event-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .live-event-channel {
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .live-event-time {
      font-size: 11px;
      font-weight: 600;
      color: var(--fifa);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .live-event-countdown {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-variant-numeric: tabular-nums;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 16px 0 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title:first-child { margin-top: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px; }
    }
    .channel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      transition: all 0.12s;
      text-align: center;
      position: relative;
      overflow: hidden;
      font-family: inherit;
      color: inherit;
      -webkit-appearance: none;
    }
    .channel:active { transform: scale(0.97); }
    .channel.active {
      border-color: var(--accent);
      background: rgba(74, 138, 255, 0.12);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .channel.fifa {
      background: linear-gradient(135deg, rgba(255, 204, 0, 0.08) 0%, rgba(255, 87, 34, 0.08) 100%);
      border-color: rgba(255, 204, 0, 0.3);
    }
    .channel.fifa.active {
      background: linear-gradient(135deg, rgba(255, 204, 0, 0.18) 0%, rgba(255, 87, 34, 0.18) 100%);
      border-color: var(--fifa);
      box-shadow: 0 0 0 1px var(--fifa);
    }
    .channel-icon {
      font-size: 22px;
      margin-bottom: 4px;
      display: block;
      line-height: 1;
    }
    .channel-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .channel-quality {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 8px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 3px;
      letter-spacing: 0.3px;
    }
    .q-fhd { background: var(--fhd); color: white; }
    .q-hd { background: var(--hd); color: white; }
    .q-sd { background: var(--text-3); color: white; }

    /* === Footer === */
    footer {
      padding: 24px 16px 16px;
      text-align: center;
      color: var(--text-3);
      font-size: 11px;
      line-height: 1.6;
    }
    footer a {
      color: var(--text-2);
      text-decoration: none;
    }
    .footer-stats {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 8px 0;
      font-weight: 600;
      color: var(--text-2);
    }
    .footer-stats span { font-weight: 800; color: var(--text); }

    /* === Error state === */
    .player-error {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.9);
      color: var(--text-2);
      gap: 8px;
      padding: 16px;
      text-align: center;
    }
    .player-error.show { display: flex; }
    .player-error-icon { font-size: 32px; }
    .player-error-msg { font-size: 12px; }
    .retry-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      font-family: inherit;
    }

    /* === Mini-player (floating when scrolled) === */
    .player-wrap.mini {
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom));
      right: 16px;
      width: 180px;
      aspect-ratio: 16 / 9;
      max-height: none;
      z-index: 200;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
      animation: miniPop 0.25s ease-out;
      cursor: pointer;
    }
    .player-wrap.mini video { border-radius: 12px; }
    @keyframes miniPop {
      from { transform: scale(0.7) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .player-wrap.mini .now-playing-name,
    .player-wrap.mini .now-playing-quality { display: none; }
    .player-wrap.mini .player-error,
    .player-wrap.mini .player-loading { font-size: 9px; padding: 4px; gap: 4px; }
    .player-wrap.mini .player-error-icon { font-size: 18px; }
    .player-wrap.mini .spinner { width: 18px; height: 18px; border-width: 2px; }
    .mini-close {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 14px;
      line-height: 1;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.25);
      font-family: inherit;
      padding: 0;
    }
    .mini-close:hover { background: rgba(255,68,68,0.9); }
    .player-wrap.mini .mini-close { display: flex; }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <span class="brand-icon">⚽</span>
      <div>
        <div class="brand-text">Piala Dunia Live</div>
        <div class="brand-sub">FIFA World Cup Streaming</div>
      </div>
    </div>
    <div class="live-badge">LIVE</div>
  </div>
</header>

<div class="player-wrap" id="playerWrap">
  <button class="mini-close" id="miniClose" type="button" aria-label="Tutup player">✕</button>
  <video id="player" playsinline controls></video>
  <div class="now-playing">
    <div class="now-playing-name" id="nowPlaying">Pilih channel</div>
    <div class="now-playing-quality" id="nowQuality"></div>
  </div>
  <div class="player-loading" id="loading">
    <div class="spinner"></div>
    <div id="loadingMsg">Memuat...</div>
  </div>
  <div class="player-error" id="error">
    <div class="player-error-icon">⚠️</div>
    <div class="player-error-msg" id="errorMsg">Stream gagal dimuat</div>
    <button class="retry-btn" id="retryBtn">Coba Lagi</button>
  </div>
</div>

<div class="toolbar">
  <input type="search" id="search" class="search-box" placeholder="🔍 Cari channel..." autocomplete="off">
  <div class="filters" id="filters"></div>
</div>

<!-- Live Events (Sedang Tayang) -->
<section class="live-events-section" id="liveEventsSection">
  <div class="live-events-header">
    <div class="live-events-title">
      <span class="live-pulse"></span>
      Sedang Tayang
    </div>
    <div class="live-events-count" id="liveEventsCount"></div>
  </div>
  <div class="live-events-scroll" id="liveEventsScroll"></div>
</section>

<main id="main">
  <div class="section-title">⚽ FIFA World Cup</div>
  <div class="grid" id="fifaGrid"></div>

  <div class="section-title">🏏 Sports / Cricket</div>
  <div class="grid" id="sportsGrid"></div>

  <div class="section-title">📺 Semua Channel</div>
  <div class="grid" id="allGrid"></div>
</main>

<footer>
  <div class="footer-stats">
    <div><span id="totalCount">0</span> Stream</div>
    <div><span id="fhdCount">0</span> FHD</div>
    <div><span id="hdCount">0</span> HD</div>
  </div>
  <div>Source: mflixott.com (Bangladesh relay)</div>
  <div style="margin-top:4px;">HLS.js player · Mobile-first PWA</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13"></script>
<!-- Shaka Player: plays MPEG-DASH (.mpd) + HLS (.m3u8). Falls back to HLS.js for legacy. -->
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.11.6/dist/shaka-player.compiled.min.js"></script>
<script>
  // === Channel data: fetched from live M3U (auto-updates weekly) ===
  let channels = [];
  const M3U_URL = './piala_dunia.m3u';

  // Map M3U group-title → UI category
  function categoryFromGroup(group) {
    const g = (group || '').toLowerCase();
    if (g.includes('world cup') || g.includes('fifa') || g.includes('piala dunia')) return 'fifa';
    if (g.includes('sport') || g.includes('sepakbola') || g.includes('bola')) return 'sports';
    return 'other';
  }

  // Detect quality from name suffix or known patterns
  function qualityFromName(name) {
    const n = (name || '').toLowerCase();
    if (n.includes('fhd') || n.includes('1080p')) return 'fhd';
    if (n.includes('hd') || n.includes('720p')) return 'hd';
    if (n.includes('sd') || n.includes('480p') || n.includes('540p') || n.includes('576p') || n.includes('360p')) return 'sd';
    return 'sd';
  }

  // Strip quality suffix for cleaner display, e.g. "RCTI HD (V+) (HD 720p)" → "RCTI HD (V+)"
  function cleanName(name) {
    return (name || '').replace(/\s*\((FHD 1080p|HD 720p|SD 480p|FHD|HD|SD|1080p|720p|480p)\)\s*$/i, '').trim() || name;
  }

  // Parse M3U text into channel array
  function parseM3U(text) {
    const lines = text.split(/\r?\n/);
    const result = [];
    let cur = null;
    for (const raw of lines) {
      const line = raw.trim();
      if (!line) continue;
      if (line.startsWith('#EXTINF')) {
        // Extract name (text after last comma)
        const commaIdx = line.lastIndexOf(',');
        const rawName = commaIdx >= 0 ? line.substring(commaIdx + 1).trim() : '';
        // Extract group-title attribute
        const groupMatch = line.match(/group-title="([^"]*)"/i);
        const group = groupMatch ? groupMatch[1] : '';
        cur = {
          name: cleanName(rawName),
          url: '',
          category: categoryFromGroup(group),
          quality: qualityFromName(rawName),
          group: group
        };
      } else if (!line.startsWith('#')) {
        // URL line (next non-comment after #EXTINF)
        if (cur && !cur.url) {
          cur.url = line;
          if (cur.name && cur.url) result.push(cur);
          cur = null;
        }
      }
    }
    return result;
  }

  // Show loading placeholder
  function showLoading() {
    const grids = ['fifaGrid', 'sportsGrid', 'allGrid'];
    grids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3);font-size:13px;">⏳ Memuat playlist…</div>';
    });
  }

  // Fetch + parse M3U, then re-render
  async function loadChannels() {
    showLoading();
    try {
      const res = await fetch(M3U_URL + '?t=' + Date.now());  // bust cache
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      channels = parseM3U(text);
      console.log(`[piala-dunia-live] Loaded ${channels.length} channels from M3U`);
      renderStats();
      renderFilters();
      renderChannels();
    } catch (err) {
      console.error('[piala-dunia-live] M3U load failed:', err);
      const grids = ['fifaGrid', 'sportsGrid', 'allGrid'];
      grids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--danger);font-size:13px;">⚠️ Gagal memuat playlist. Coba refresh halaman.</div>';
      });
    }
  }

  // === Stats ===
  function renderStats() {
    document.getElementById('totalCount').textContent = channels.length;
    document.getElementById('fhdCount').textContent = channels.filter(c => c.quality === 'fhd').length;
    document.getElementById('hdCount').textContent = channels.filter(c => c.quality === 'hd').length;
  }

  // === Filters ===
  const filtersEl = document.getElementById('filters');
  const filterDefs = [
    { id: 'all', label: 'Semua', icon: '🎬' },
    { id: 'fifa', label: 'FIFA WC', icon: '⚽' },
    { id: 'sports', label: 'Sports', icon: '🏏' },
    { id: 'fhd', label: 'FHD 1080p', icon: '🟣' },
    { id: 'hd', label: 'HD 720p', icon: '🟢' },
  ];
  let activeFilter = 'all';

  function renderFilters() {
    filtersEl.innerHTML = '';
    filterDefs.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'chip' + (activeFilter === f.id ? ' active' : '');
      const count = countByFilter(f.id);
      btn.innerHTML = `${f.icon} ${f.label}<span class="chip-count">${count}</span>`;
      btn.onclick = () => { activeFilter = f.id; renderFilters(); renderChannels(); };
      filtersEl.appendChild(btn);
    });
  }

  function countByFilter(id) {
    if (id === 'all') return channels.length;
    if (['fifa', 'sports', 'other'].includes(id)) return channels.filter(c => c.category === id).length;
    if (['fhd', 'hd', 'sd'].includes(id)) return channels.filter(c => c.quality === id).length;
    return 0;
  }

  // === Render channel cards ===
  function makeCard(ch, isFifaSection) {
    const card = document.createElement('button');
    card.className = 'channel' + (ch.category === 'fifa' ? ' fifa' : '');
    card.dataset.name = ch.name;
    card.dataset.url = ch.url;
    card.dataset.quality = ch.quality;
    card.dataset.category = ch.category;
    const icon = ch.category === 'fifa' ? '⚽' : (ch.category === 'sports' ? '🏏' : '📺');
    const qLabel = ch.quality === 'fhd' ? '<div class="channel-quality q-fhd">FHD</div>' :
                   ch.quality === 'hd' ? '<div class="channel-quality q-hd">HD</div>' :
                   '<div class="channel-quality q-sd">SD</div>';
    card.innerHTML = `${qLabel}<span class="channel-icon">${icon}</span><div class="channel-name">${ch.name}</div>`;
    card.onclick = () => playChannel(ch);
    return card;
  }

  function renderChannels() {
    const search = document.getElementById('search').value.trim().toLowerCase();
    const filterFn = (ch) => {
      // Search filter
      if (search && !ch.name.toLowerCase().includes(search)) return false;
      // Category filter
      if (activeFilter === 'all') return true;
      if (['fifa', 'sports', 'other'].includes(activeFilter)) return ch.category === activeFilter;
      if (['fhd', 'hd', 'sd'].includes(activeFilter)) return ch.quality === activeFilter;
      return true;
    };

    const fifa = channels.filter(ch => ch.category === 'fifa' && filterFn(ch));
    const sports = channels.filter(ch => ch.category === 'sports' && filterFn(ch));
    const others = channels.filter(ch => ch.category === 'other' && filterFn(ch));

    document.getElementById('fifaGrid').innerHTML = '';
    document.getElementById('sportsGrid').innerHTML = '';
    document.getElementById('allGrid').innerHTML = '';

    fifa.forEach(ch => document.getElementById('fifaGrid').appendChild(makeCard(ch, true)));
    sports.forEach(ch => document.getElementById('sportsGrid').appendChild(makeCard(ch, false)));
    others.forEach(ch => document.getElementById('allGrid').appendChild(makeCard(ch, false)));

    // Toggle section visibility
    document.querySelectorAll('.section-title').forEach((el, i) => {
      const grid = el.nextElementSibling;
      el.style.display = grid.children.length === 0 ? 'none' : 'flex';
    });

    // Highlight current playing
    if (currentChannel) {
      document.querySelectorAll('.channel').forEach(c => {
        if (c.dataset.url === currentChannel.url) c.classList.add('active');
      });
    }
  }

  // === HLS Player ===
  const video = document.getElementById('player');
  const loadingEl = document.getElementById('loading');
  const loadingMsg = document.getElementById('loadingMsg');
  const errorEl = document.getElementById('error');
  const errorMsg = document.getElementById('errorMsg');
  const retryBtn = document.getElementById('retryBtn');
  const nowPlaying = document.getElementById('nowPlaying');
  const nowQuality = document.getElementById('nowQuality');
  let currentChannel = null;
  let hls = null;
  let shakaPlayer = null;  // shaka player instance (reused for DASH+HLS)

  // === Shaka init: configure DRM-free streaming (we only do public FTA streams) ===
  if (window.shaka && shaka.polyfill) {
    shaka.polyfill.installAll();
  }
  async function ensureShaka() {
    if (shakaPlayer) return shakaPlayer;
    if (!window.shaka || !shaka.Player) {
      throw new Error('Shaka not loaded');
    }
    shakaPlayer = new shaka.Player();
    shakaPlayer.configure({
      drm: { servers: {} },  // no DRM, public streams only
      streaming: {
        bufferingGoal: 30,
        rebufferingGoal: 4,
        retryParameters: { maxAttempts: 3, baseDelay: 500, backoffFactor: 2 }
      },
      abr: { enabled: true }  // adaptive bitrate
    });
    // Shaka error logging
    shakaPlayer.addEventListener('error', (e) => {
      console.warn('[Shaka] error:', e.detail && e.detail.code, e.detail && e.detail.message);
    });
    return shakaPlayer;
  }

  function isDashUrl(url) {
    return /\.mpd(\?|$)/i.test(url || '');
  }

  async function playChannel(ch) {
    currentChannel = ch;
    nowPlaying.textContent = ch.name;
    nowQuality.textContent = ch.quality === 'fhd' ? 'FHD' : ch.quality === 'hd' ? 'HD' : 'SD';
    loadingEl.classList.remove('hidden');
    errorEl.classList.remove('show');
    loadingMsg.textContent = 'Memuat ' + ch.name + '...';

    // Highlight active card
    document.querySelectorAll('.channel').forEach(c => {
      c.classList.toggle('active', c.dataset.url === ch.url);
    });

    // Cleanup previous players
    if (hls) { hls.destroy(); hls = null; }
    if (shakaPlayer) {
      try { await shakaPlayer.detach(); } catch (e) {}
    }

    // === Route to Shaka for DASH or any format; fallback to HLS.js ===
    const url = ch.url;
    const tryShaka = window.shaka && shaka.Player && shaka.Player.isBrowserSupported();

    if (tryShaka) {
      try {
        const player = await ensureShaka();
        await player.attach(video);
        await player.load(url);
        // Detect actual format for the quality label (Shaka handles both transparently)
        const stats = player.getStats();
        const isMpd = (player.getManifestType && player.getManifestType() === 'DASH') || /\.mpd(\?|$)/i.test(url);
        if (isMpd) console.log('[Shaka] playing DASH:', url);
        else console.log('[Shaka] playing HLS:', url);
        video.play().catch(e => console.log('Autoplay blocked:', e));
        loadingEl.classList.add('hidden');
        return;
      } catch (err) {
        console.warn('[Shaka] failed, falling back to HLS.js:', err && err.message);
        // fall through to HLS.js below
        try { if (shakaPlayer) await shakaPlayer.detach(); } catch (e) {}
      }
    }

    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, lowLatencyMode: false });
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(e => console.log('Autoplay blocked:', e));
        loadingEl.classList.add('hidden');
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              errorMsg.textContent = 'Network error - coba lagi';
              errorEl.classList.add('show');
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              errorMsg.textContent = 'Media error - coba lagi';
              errorEl.classList.add('show');
              hls.recoverMediaError();
              break;
            default:
              errorMsg.textContent = 'Stream error: ' + data.type;
              errorEl.classList.add('show');
          }
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS (Safari)
      video.src = ch.url;
      video.addEventListener('loadedmetadata', () => {
        video.play();
        loadingEl.classList.add('hidden');
      });
    } else {
      errorMsg.textContent = 'Browser tidak support HLS/DASH';
      errorEl.classList.add('show');
    }

    // Hide loading after timeout fallback
    setTimeout(() => loadingEl.classList.add('hidden'), 5000);
  }

  video.addEventListener('playing', () => loadingEl.classList.add('hidden'));
  video.addEventListener('waiting', () => loadingEl.classList.remove('hidden'));
  retryBtn.onclick = () => { if (currentChannel) playChannel(currentChannel); };

  // === Mini-player: shrink to floating when player scrolls out of view ===
  const playerWrap = document.getElementById('playerWrap');
  const miniClose = document.getElementById('miniClose');
  let isMini = false;

  function setMini(shouldMini) {
    if (shouldMini === isMini) return;
    // Don't mini if no channel playing
    if (shouldMini && !currentChannel) return;
    isMini = shouldMini;
    playerWrap.classList.toggle('mini', shouldMini);
  }

  // Throttled scroll handler
  let scrollTick = false;
  window.addEventListener('scroll', () => {
    if (scrollTick) return;
    scrollTick = true;
    requestAnimationFrame(() => {
      const rect = playerWrap.getBoundingClientRect();
      // Switch to mini when player bottom is <60px from top (mostly scrolled past)
      setMini(rect.bottom < 60);
      scrollTick = false;
    });
  }, { passive: true });

  // Tap mini-player → restore full size
  playerWrap.addEventListener('click', (e) => {
    if (e.target === miniClose) return;  // close btn handled below
    if (!isMini) return;
    setMini(false);
    playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // Close button → stop stream, hide player
  miniClose.onclick = (e) => {
    e.stopPropagation();
    if (hls) { hls.destroy(); hls = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    currentChannel = null;
    setMini(false);
    nowPlaying.textContent = 'Pilih channel';
    nowQuality.textContent = '';
    document.querySelectorAll('.channel.active').forEach(c => c.classList.remove('active'));
  };

  // === Search handler ===
  document.getElementById('search').addEventListener('input', renderChannels);

  // === Live Events (Sedang Tayang) ===
  const LIVE_EVENTS_URL = './live_events.json';
  const liveSection = document.getElementById('liveEventsSection');
  const liveScroll = document.getElementById('liveEventsScroll');
  const liveCount = document.getElementById('liveEventsCount');
  let liveEventsData = { events: [], last_updated: null };

  function isEventActive(ev) {
    const now = Date.now();
    const start = new Date(ev.start).getTime();
    const end = new Date(ev.end).getTime();
    return now >= start && now < end;
  }

  function formatCountdown(ev) {
    const now = Date.now();
    const end = new Date(ev.end).getTime();
    const remaining = end - now;
    if (remaining <= 0) return '00:00';
    const totalSec = Math.floor(remaining / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function formatTimeRange(ev) {
    try {
      const s = new Date(ev.start);
      const e = new Date(ev.end);
      const fmt = (d) => d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Jakarta' });
      return `${fmt(s)}–${fmt(e)} WIB`;
    } catch { return ''; }
  }

  function renderLiveEvents() {
    const active = liveEventsData.events.filter(isEventActive);
    if (active.length === 0) {
      liveSection.classList.remove('show');
      liveScroll.innerHTML = '';
      liveCount.textContent = '';
      return;
    }
    // Sort by start time
    active.sort((a, b) => new Date(a.start) - new Date(b.start));
    liveScroll.innerHTML = '';
    active.forEach(ev => {
      const card = document.createElement('button');
      card.className = 'live-event-card';
      card.type = 'button';
      card.innerHTML = `
        <div class="live-event-category">${ev.category || 'Live Event'}</div>
        <div class="live-event-title">${ev.title}</div>
        <div class="live-event-channel">📺 ${ev.channel_name}</div>
        <div class="live-event-time">
          <span>${formatTimeRange(ev)}</span>
          <span class="live-event-countdown">⏱ ${formatCountdown(ev)}</span>
        </div>
      `;
      card.onclick = () => {
        // Find matching channel in our M3U list, or play URL directly
        const matched = channels.find(c => c.url === ev.channel_url || c.name === ev.channel_name);
        if (matched) {
          playChannel(matched);
        } else {
          // Play URL directly via a synthetic channel
          playChannel({
            name: ev.channel_name,
            url: ev.channel_url,
            quality: 'fhd',
            category: 'fifa'
          });
        }
        // Scroll player into view
        document.getElementById('playerWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      liveScroll.appendChild(card);
    });
    liveSection.classList.add('show');
    liveCount.textContent = `${active.length} event`;
  }

  async function loadLiveEvents() {
    try {
      const res = await fetch(LIVE_EVENTS_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      liveEventsData = await res.json();
      renderLiveEvents();
    } catch (err) {
      console.warn('[live-events] load failed:', err);
    }
  }

  // Update countdowns every second
  setInterval(() => {
    if (liveEventsData.events.some(isEventActive)) renderLiveEvents();
  }, 1000);

  // Refresh event list every 5 min (in case schedule changes)
  setInterval(loadLiveEvents, 5 * 60 * 1000);

  // === Init: fetch M3U then render + auto-play first FIFA ===
  loadChannels().then(() => {
    const firstFifa = channels.find(c => c.category === 'fifa');
    if (firstFifa) setTimeout(() => playChannel(firstFifa), 500);
  });

  // Load live events immediately + retry after channels load
  loadLiveEvents();
  setTimeout(loadLiveEvents, 2000);

  // === PWA service worker ===
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
